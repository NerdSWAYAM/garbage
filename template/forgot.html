<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – EcoScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;
        --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
        --green:#4ade80;--green2:#22c55e;--green-dim:rgba(74,222,128,0.1);
        --text:#f0f6fc;--text2:#8b949e;--text3:#6e7681;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 20%,rgba(74,222,128,0.05) 0%,transparent 60%);pointer-events:none}

    nav{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(13,17,23,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:100}
    .nav-brand{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:1.25rem;color:var(--text);text-decoration:none}
    .nav-links{display:flex;align-items:center;gap:8px}
    .nav-links a{text-decoration:none;color:var(--text2);font-size:0.9rem;font-weight:500;padding:7px 14px;border-radius:8px;transition:all 0.2s}
    .nav-links a:hover{color:var(--text)}
    .nav-cta{background:var(--green)!important;color:#000!important;font-weight:600!important}

    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:84px 5% 40px}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px}

    .card-header{text-align:center;margin-bottom:28px}
    .card-icon{font-size:2.5rem;display:block;margin-bottom:14px}
    .card-header h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;color:var(--text);margin-bottom:6px}
    .card-header p{color:var(--text2);font-size:0.875rem;line-height:1.6}

    form{display:flex;flex-direction:column;gap:16px}

    .field-group{display:flex;flex-direction:column;gap:7px}
    label{font-size:0.78rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em}
    .input-wrap{position:relative;display:flex;align-items:center}
    .input-icon{position:absolute;left:14px;color:var(--text3);pointer-events:none}
    .input-wrap input{width:100%;padding:12px 44px 12px 42px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:all 0.2s;outline:none}
    .input-wrap input::placeholder{color:var(--text3)}
    .input-wrap input:focus{border-color:var(--green);background:rgba(74,222,128,0.04);box-shadow:0 0 0 3px rgba(74,222,128,0.1)}
    .eye-btn{position:absolute;right:12px;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;padding:4px;border-radius:6px;transition:color 0.2s;width:auto}
    .eye-btn:hover,.eye-btn.active{color:var(--green)}

    .strength-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:2px}
    .strength-fill{height:100%;width:0%;border-radius:2px;transition:all 0.35s ease}

    .submit-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 24px;background:var(--green);border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:4px;transition:all 0.25s}
    .submit-btn:hover{background:var(--green2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(74,222,128,0.25)}

    .back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;color:var(--text3);font-size:0.875rem;text-decoration:none;transition:color 0.2s}
    .back-link:hover{color:var(--green)}
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand"><span>♻</span> EcoScan</a>
        <div class="nav-links">
            <a href="/login">Sign In</a>
            {% if session.get('user') %}
            <a href="/logout" class="nav-cta nav-logout-btn">Sign Out</a>
            {% else %}
            <a href="/register" class="nav-cta">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="page">
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🔐</span>
                <h1>Reset Password</h1>
                <p>Enter your email address and choose a new password to regain access to your account.</p>
            </div>

            <form action="/forgot-password" method="post">
                <div class="field-group">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">New Password</label>
                    <div class="input-wrap">
                        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)">
                        <button type="button" class="eye-btn" onclick="togglePassword('password',this)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                </div>

                <button type="submit" class="submit-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    Reset Password
                </button>
            </form>

            <a href="/login" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back to Sign In
            </a>
        </div>
    </div>

    <script>
    function togglePassword(id, btn) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.classList.toggle('active');
    }
    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['','#ef4444','#f59e0b','#84cc16','#4ade80'];
        fill.style.width = (score * 25) + '%';
        fill.style.background = colors[score];
    }
    </script>
</body>
</html>
